name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'schema/**'
      - 'functions/**'
  # Also deploy when faction data is updated by the faction workflow
  workflow_run:
    workflows: ["Faction Data Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by failed faction workflow
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate sitemap
        working-directory: web
        run: npm run generate-sitemap

      - name: Build
        working-directory: web
        run: npm run build

      # Download faction data from GitHub Releases and include in dist
      # This serves faction zips from the same origin, avoiding CORS issues
      - name: Download faction data from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/dist/factions

          # Download all assets from the faction-data release
          echo "Downloading faction data from release..."
          gh release download faction-data --dir web/dist/factions --pattern "*.zip" --pattern "manifest.json" || {
            echo "Warning: Could not download faction data from release"
            echo "This is expected if the faction-data release doesn't exist yet"
          }

          # List what was downloaded
          echo "Faction data downloaded:"
          ls -la web/dist/factions/ || echo "No faction data found"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=pa-pedia

      # The Cloudflare zone edge-caches index.html for hours (cf-cache-status
      # HIT), so a JS-hash-changing deploy strands users on the previous chunk
      # graph — blank page or "Failed to fetch dynamically imported module" —
      # until someone manually purges. Purge after every deploy so the edge
      # serves the freshly-deployed index.html immediately. Hashed /assets/* are
      # immutable, so purging everything is safe (they just re-fetch).
      #
      # Requires: CLOUDFLARE_ZONE_ID secret + the API token having
      # "Zone → Cache Purge → Purge" permission on this zone.
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID not set — skipping cache purge."
            echo "Add the zone ID secret (and give the API token Cache Purge scope)"
            echo "so deploys stop stranding users on stale HTML."
            exit 0
          fi
          echo "Purging Cloudflare cache for zone ${CLOUDFLARE_ZONE_ID}..."
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          if [ "$(echo "$response" | jq -r '.success')" != "true" ]; then
            echo "::error::Cloudflare cache purge failed. Check that the API token has"
            echo "'Zone → Cache Purge → Purge' permission and CLOUDFLARE_ZONE_ID is correct."
            exit 1
          fi
          echo "Cache purged."
