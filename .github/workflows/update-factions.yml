name: Update Factions

on:
  schedule:
    # Daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      profiles:
        description: 'Comma-separated profile IDs to update (empty = all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

# Only one update at a time
concurrency:
  group: update-factions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Download and decrypt base game data
      - name: Download base data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading base data from pa-base-data release..."
          mkdir -p /tmp/base-data-download
          gh release download pa-base-data \
            --pattern "pa-base-data-*.tar.gz.enc" \
            --pattern "pa-base-data-meta.json" \
            --dir /tmp/base-data-download

          echo "Downloaded:"
          ls -la /tmp/base-data-download/

      - name: Decrypt base data
        id: base-data
        env:
          PA_BASE_DATA_KEY: ${{ secrets.PA_BASE_DATA_KEY }}
        run: |
          ENC_FILE=$(ls /tmp/base-data-download/pa-base-data-*.tar.gz.enc)
          echo "Decrypting: $(basename $ENC_FILE)"

          # Decrypt using Node.js (matches extract-base-data.ts encryption)
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const data = fs.readFileSync('$ENC_FILE');
            const iv = data.subarray(0, 16);
            const encrypted = data.subarray(16);
            const key = crypto.scryptSync(process.env.PA_BASE_DATA_KEY, 'pa-pedia-base-data', 32);
            const decipher = crypto.createDecipheriv('aes-256-cbc', key, iv);
            const decrypted = Buffer.concat([decipher.update(encrypted), decipher.final()]);
            fs.writeFileSync('/tmp/pa-base-data.tar.gz', decrypted);
          "

          # Extract
          mkdir -p /tmp/pa-media
          tar -xzf /tmp/pa-base-data.tar.gz -C /tmp/pa-media

          echo "Base data extracted to /tmp/pa-media"
          echo "Contents:"
          ls /tmp/pa-media/

          # Extract PA build number from metadata (used as MLA version)
          BUILD=$(jq -r '.build' /tmp/base-data-download/pa-base-data-meta.json)
          echo "PA Build: $BUILD"
          echo "pa_build=$BUILD" >> "$GITHUB_OUTPUT"

      # Build CLI
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build CLI
        working-directory: cli
        run: go build -o /tmp/pa-pedia .

      # MLA Golden Test - validates base data is correct
      # Generates MLA from cached base data and compares against committed version.
      # If they differ, the base data cache is stale or corrupted.
      - name: Validate base data (MLA golden test)
        run: |
          echo "Running MLA golden test..."
          PA_BUILD="${{ steps.base-data.outputs.pa_build }}"
          /tmp/pa-pedia describe-faction \
            --profile mla \
            --pa-root /tmp/pa-media \
            --version "$PA_BUILD" \
            --output /tmp/golden-test

          # Compare units.json (sorted keys for stable comparison)
          echo "Comparing MLA units.json..."
          jq -S . factions/MLA/units.json > /tmp/mla-committed.json
          jq -S . /tmp/golden-test/MLA/units.json > /tmp/mla-generated.json

          if ! diff /tmp/mla-committed.json /tmp/mla-generated.json > /tmp/mla-diff.txt 2>&1; then
            echo "::error::MLA golden test FAILED - base data is stale or corrupted"
            echo ""
            echo "The generated MLA faction data does not match what is committed."
            echo "This means the cached base game data is out of sync."
            echo ""
            echo "To fix:"
            echo "  1. Run: just extract-base-data PA_ROOT=\"C:/PA/media\""
            echo "  2. Run: just upload-base-data"
            echo ""
            echo "Diff (first 50 lines):"
            head -50 /tmp/mla-diff.txt
            exit 1
          fi

          echo "MLA golden test passed - base data is valid"

      # Regenerate faction data
      - name: Determine profiles to update
        id: profiles
        run: |
          INPUT_PROFILES="${{ github.event.inputs.profiles }}"
          if [ -z "$INPUT_PROFILES" ]; then
            echo "profiles=mla legion exiles bugs second-wave" >> "$GITHUB_OUTPUT"
            echo "Updating all profiles"
          else
            # Convert comma-separated to space-separated
            PROFILES=$(echo "$INPUT_PROFILES" | tr ',' ' ')
            echo "profiles=$PROFILES" >> "$GITHUB_OUTPUT"
            echo "Updating profiles: $PROFILES"
          fi

      - name: Regenerate faction data
        run: |
          PA_BUILD="${{ steps.base-data.outputs.pa_build }}"
          for profile in ${{ steps.profiles.outputs.profiles }}; do
            echo "========================================="
            echo "Processing: $profile"
            echo "========================================="

            # MLA needs explicit version (base game has no modinfo.json)
            VERSION_FLAG=""
            if [ "$profile" = "mla" ]; then
              VERSION_FLAG="--version $PA_BUILD"
            fi

            /tmp/pa-pedia describe-faction \
              --profile "$profile" \
              --pa-root /tmp/pa-media \
              --output ./factions \
              $VERSION_FLAG
            echo ""
          done

      # Create PR if changes detected
      - name: Check for changes
        id: changes
        run: |
          # Check for any changes in factions/ (excluding dist/)
          git add factions/
          if git diff --cached --quiet -- 'factions/' ':!factions/dist/'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No faction data changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in faction data:"
            git diff --cached --stat -- 'factions/' ':!factions/dist/'

            # Detect which factions changed (folder names under factions/)
            CHANGED=$(git diff --cached --name-only -- 'factions/' ':!factions/dist/' \
              | sed 's|^factions/||' | cut -d/ -f1 | sort -u | tr '\n' ', ' | sed 's/,$//')
            echo "changed_factions=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed factions: $CHANGED"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED="${{ steps.changes.outputs.changed_factions }}"

          # Build version fingerprint from changed factions' metadata
          # e.g. "legion-1.32.1_bugs-1.36" — used in branch name to deduplicate PRs
          VERSION_PARTS=""
          for faction_dir in $(git diff --cached --name-only -- 'factions/' ':!factions/dist/' \
            | sed 's|^factions/||' | cut -d/ -f1 | sort -u); do
            META="factions/$faction_dir/metadata.json"
            if [ -f "$META" ]; then
              ID=$(jq -r '.identifier' "$META")
              VER=$(jq -r '.version' "$META")
              if [ -n "$VERSION_PARTS" ]; then
                VERSION_PARTS="${VERSION_PARTS}_${ID}-${VER}"
              else
                VERSION_PARTS="${ID}-${VER}"
              fi
            fi
          done

          # Short hash of version fingerprint for branch name (avoids overly long names)
          FINGERPRINT=$(echo "$VERSION_PARTS" | sha256sum | cut -c1-12)
          BRANCH="auto/update-factions-${FINGERPRINT}"
          echo "Version fingerprint: $VERSION_PARTS"
          echo "Branch: $BRANCH"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check for existing open PR with same version fingerprint
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for these versions — skipping"
            echo "Versions: $VERSION_PARTS"
            exit 0
          fi

          # Create branch and PR
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git checkout -B "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          # Stage only faction data changes (not dist/)
          git reset HEAD
          git add 'factions/' ':!factions/dist/'
          git commit -m "chore: update faction data — $CHANGED

          Updated by the automated faction update workflow.
          Changed factions: $CHANGED
          Versions: $VERSION_PARTS"

          git push -u origin "$BRANCH" --force

          gh pr create \
            --title "chore: update faction data — $CHANGED" \
            --body "$(cat <<EOF
          ## Summary
          Automated faction data update from upstream mod repositories.

          **Changed factions**: $CHANGED
          **Versions**: $VERSION_PARTS

          ## Review checklist
          - [ ] Diff looks reasonable (no unexpected unit additions/removals)
          - [ ] Version numbers updated appropriately

          ---
          *Generated by the [Update Factions](../actions/workflows/update-factions.yml) workflow*
          EOF
          )" \
            --base main
